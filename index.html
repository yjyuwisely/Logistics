<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freight Email Generator - Option B</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --primary:#1d4ed8;
      --primary-dark:#163ea8;
      --soft:#eef4ff;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#f7faff 0%, #eef4fb 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1240px;
      margin:32px auto;
      padding:0 20px;
    }

    .hero{ margin-bottom:20px; }

    .eyebrow{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:var(--soft);
      color:var(--primary);
      font-size:13px;
      font-weight:700;
      letter-spacing:.02em;
    }

    h1{
      margin:14px 0 8px;
      font-size:38px;
      line-height:1.1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:16px;
      max-width:840px;
      line-height:1.6;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      align-items:start;
      margin-top:24px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(219,227,238,.9);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#fcfdff;
    }

    .card-head h2{
      margin:0;
      font-size:20px;
    }

    .badge{
      font-size:12px;
      color:var(--primary);
      background:var(--soft);
      padding:7px 10px;
      border-radius:999px;
      font-weight:700;
    }

    .card-body{ padding:22px; }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .row-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .field{ margin-bottom:14px; }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
      color:#374151;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      color:var(--text);
      background:#fff;
      outline:none;
      transition:.18s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#7aa2ff;
      box-shadow:0 0 0 4px rgba(29,78,216,.08);
    }

    textarea{
      resize:vertical;
      line-height:1.5;
    }

    #cargo{ min-height:84px; }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:8px;
      margin-bottom:18px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:13px 18px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{ background:var(--primary-dark); }

    .btn-secondary{
      background:#eef2f7;
      color:#334155;
    }

    .btn-secondary:hover{ background:#e4eaf2; }

    .output-block{ margin-bottom:18px; }

    .output-label{
      font-size:13px;
      font-weight:700;
      color:#374151;
      margin-bottom:8px;
    }

    .subject-box, .body-box{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fbfdff;
    }

    .subject-box{
      padding:14px 16px;
      font-weight:600;
      min-height:54px;
      display:flex;
      align-items:center;
      line-height:1.5;
      word-break:break-word;
    }

    .body-box{
      padding:16px;
      min-height:520px;
      white-space:pre-wrap;
      line-height:1.65;
      font-size:14px;
    }

    .section-title{
      margin:0 0 12px;
      font-size:15px;
      font-weight:800;
      color:#1f2937;
    }

    .hidden{ display:none !important; }

    .sub-box{
      margin-bottom:14px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fcfdff;
    }

    .sub-box-title{
      margin:0 0 10px;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }

    @media (max-width: 700px){
      h1{font-size:30px}
      .row,.row-3{grid-template-columns:1fr}
      .wrap{margin:20px auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">🚚 Freight Operations Tool</span>
      <h1>Freight Email Generator</h1>
      <p class="sub">입력값에 따라 제목과 본문이 자동으로 생성됩니다.</p>
    </section>

    <section class="grid">
      <div class="card">
        <div class="card-head">
          <h2>Input</h2>
          <span class="badge">Shared Form</span>
        </div>
        <div class="card-body">

          <div class="section-title">Shipment Details</div>

          <div class="row-3">
            <div class="field">
              <label for="mode">Mode</label>
              <select id="mode">
                <option>Air</option>
                <option>LCL</option>
                <option>FCL</option>
              </select>
            </div>

            <div class="field">
              <label for="stage">Stage</label>
              <select id="stage">
                <option value="S — Request">S — Request</option>
                <option value="Rate — Freight">Rate — Freight</option>
                <option value="B — Booking">B — Booking</option>
                <option value="A — Schedule">A — Schedule</option>
                <option value="T — Trucking">T — Trucking</option>
                <option value="CD — Check-in">CD — Check-in</option>
                <option value="docsStage">DOCS / FI</option>
                <option value="Pre-alert">Pre-alert</option>
                <option value="D/N">D/N</option>
              </select>
            </div>

            <div class="field">
              <label for="subjectStyle">Subject Style</label>
              <select id="subjectStyle">
                <option value="full" selected>Style 1 — With Stage / S / C / Ref</option>
                <option value="standard">Style 2 — Standard</option>
                <option value="agent">Style 3 — Korean Agent Style</option>
              </select>
            </div>
          </div>

          <div id="sTypeWrap" class="field hidden">
            <label for="sMessageType">S Message Type</label>
            <select id="sMessageType">
              <option value="agentInitial">Korean agent — initial update</option>
              <option value="shipperSli">Shipper — SLI request</option>
              <option value="agentDocs">Korean agent — docs update</option>
            </select>
          </div>

          <div id="aTypeWrap" class="field hidden">
            <label for="aMessageType">A Message Type</label>
            <select id="aMessageType">
              <option value="schedulePickup">Schedule + Pickup</option>
              <option value="scheduleRate">Schedule + Rate</option>
              <option value="schedulePickupRate">Schedule + Pickup + Rate</option>
            </select>
          </div>

          <div id="preAlertTypeWrap" class="field hidden">
            <label for="preAlertMessageType">Pre-alert Message Type</label>
            <select id="preAlertMessageType">
              <option value="preAlertOnly">Pre-alert only</option>
              <option value="preAlertDn">Pre-alert + D/N</option>
            </select>
          </div>

          <div id="dnTypeWrap" class="field hidden">
            <label for="dnMessageType">D/N Message Type</label>
            <select id="dnMessageType">
              <option value="sellingInfoDn">Selling info received + D/N</option>
              <option value="dnOnly">D/N only</option>
            </select>
          </div>

          <div id="shipperConsigneeWrap" class="row">
            <div id="shipperWrap" class="field">
              <label for="shipper">Shipper</label>
              <input id="shipper" type="text" value="Dynamic Ratings Pty Ltd" />
            </div>
            <div id="consigneeWrap" class="field">
              <label for="consignee">Consignee</label>
              <input id="consignee" type="text" value="Pin Cargo Korea" />
            </div>
          </div>

          <div id="originDestinationWrap" class="row">
            <div id="originWrap" class="field">
              <label for="origin">Origin</label>
              <input id="origin" type="text" value="Sydney" />
            </div>
            <div id="destinationWrap" class="field">
              <label for="destination">Destination</label>
              <input id="destination" type="text" value="Busan" />
            </div>
          </div>

          <div id="commodityWrap" class="field">
            <label for="commodity">Commodity</label>
            <input id="commodity" type="text" value="Pump parts" />
          </div>

          <div id="cargoWrap" class="field">
            <label for="cargo">Cargo details</label>
            <textarea id="cargo" rows="3">1 CASE / 66 KGS / 83 x 83 x 63 cm</textarea>
          </div>

          <div id="pickupRefWrap" class="row">
            <div id="pickupWrap" class="field">
              <label id="pickupLabel" for="pickup">Pickup date</label>
              <input id="pickup" type="date" value="2026-03-11" />
            </div>
            <div id="refWrap" class="field">
              <label for="ref">Reference</label>
              <input id="ref" type="text" value="S00013958" />
            </div>
          </div>

          <div id="bookingAirlineWrap" class="field hidden">
            <label for="bookingAirline">Airline</label>
            <input id="bookingAirline" type="text" value="" />
          </div>

          <div id="truckingCompanyWrap" class="field hidden">
            <label for="driverCompany">Driver's company name</label>
            <input id="driverCompany" type="text" value="Direct Couriers" />
          </div>

          <div id="docsFlightDateWrap" class="field hidden">
            <label for="docsFlightDate">Flight date</label>
            <input id="docsFlightDate" type="date" value="2026-03-11" />
          </div>

          <div id="agentNameWrap" class="field hidden">
            <label for="agentName">Agent name</label>
            <input id="agentName" type="text" value="Cargoway" />
          </div>

          <div id="incotermsWrap" class="field hidden">
            <label for="incoterms">Incoterms</label>
            <input id="incoterms" type="text" value="EXW" />
          </div>

          <div id="flightNameWrap" class="field hidden">
            <label id="flightNameLabel" for="flightName">Airline name</label>
            <input id="flightName" type="text" value="MH" />
          </div>

          <div id="pickupAddressWrap" class="field hidden">
            <label for="pickupAddress">Pick-up address</label>
            <input id="pickupAddress" type="text" value="48 – 58 Overseas Drive, Noble Park North Victoria 3174" />
          </div>

          <div id="dgWrap" class="field hidden">
            <label for="dgStatus">DG</label>
            <select id="dgStatus">
              <option selected>No</option>
              <option>Yes</option>
            </select>
          </div>

          <div id="docsAirWrap" class="row hidden">
            <div class="field">
              <label for="mawbDocs">MAWB</label>
              <input id="mawbDocs" type="text" value="" />
            </div>
            <div class="field">
              <label for="hawbDocs">HAWB</label>
              <input id="hawbDocs" type="text" value="" />
            </div>
          </div>

          <div id="fiSeaWrap" class="row hidden">
            <div class="field">
              <label for="mblFi">MBL</label>
              <input id="mblFi" type="text" value="" />
            </div>
            <div class="field">
              <label for="hsCodeFi">HS Code</label>
              <input id="hsCodeFi" type="text" value="" />
            </div>
          </div>

          <div id="fiSeaWrap2" class="field hidden">
            <label for="ednFi">EDN</label>
            <input id="ednFi" type="text" value="" />
          </div>

          <div id="preAlertWrap" class="sub-box hidden">
            <div class="sub-box-title">Pre-alert Details</div>

            <div class="row">
              <div class="field">
                <label id="masterNoLabel" for="masterNo">MAWB</label>
                <input id="masterNo" type="text" value="" />
              </div>
              <div class="field">
                <label id="houseNoLabel" for="houseNo">HAWB</label>
                <input id="houseNo" type="text" value="" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label id="transportNameLabel" for="transportName">AIRLINE</label>
                <input id="transportName" type="text" value="" />
              </div>
              <div class="field">
                <label id="etdLabel" for="etd">ETD</label>
                <input id="etd" type="text" value="" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label for="ts">T/S</label>
                <input id="ts" type="text" value="" />
              </div>
              <div class="field">
                <label id="etaLabel" for="eta">ETA</label>
                <input id="eta" type="text" value="" />
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>Output</h2>
          <span class="badge">Live Preview</span>
        </div>
        <div class="card-body">
          <div class="actions">
            <button class="btn-primary" onclick="copyBody()">Copy Body</button>
            <button class="btn-secondary" onclick="copySubject()">Copy Subject</button>
            <button class="btn-secondary" onclick="resetDemo()">Reset Demo</button>
          </div>

          <div class="output-block">
            <div class="output-label">Email Subject</div>
            <div id="subject" class="subject-box"></div>
          </div>

          <div class="output-block">
            <div class="output-label">Email Body</div>
            <div id="body" class="body-box"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    function shortCode(city){
      const map = {
        "Sydney":"SYD",
        "Melbourne":"MEL",
        "Brisbane":"BNE",
        "Perth":"PER",
        "Adelaide":"ADL",
        "Busan":"PUS",
        "Seoul":"SEL",
        "Incheon":"INC",
        "Jakarta":"JKT",
        "Delhi":"DEL",
        "Ho Chi Minh":"SGN",
        "Auckland":"AKL",
        "Singapore":"SIN",
        "Los Angeles":"LAX",
        "Frankfurt":"FRE"
      };
      return map[city] || city.toUpperCase().replace(/\s+/g, '').slice(0,3);
    }

    function escapeHtml(text){
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function parseDateInput(dateString){
      if(!dateString) return null;
      const parts = dateString.split('-');
      if(parts.length !== 3) return null;
      const year = Number(parts[0]);
      const month = Number(parts[1]) - 1;
      const day = Number(parts[2]);
      return new Date(year, month, day);
    }

    function formatKoreanPickupDate(dateString){
      const date = parseDateInput(dateString);
      if(!date || isNaN(date.getTime())) return dateString;

      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      const day = date.getDate();
      const weekday = weekdays[date.getDay()];

      return `${day}일(${weekday})`;
    }

function formatEnglishDateLong(dateString){
  const date = parseDateInput(dateString);
  if(!date || isNaN(date.getTime())) return dateString;

  const parts = new Intl.DateTimeFormat('en-AU', {
    weekday: 'long',
    day: 'numeric',
    month: 'long'
  }).formatToParts(date);

  const weekday = parts.find(p => p.type === 'weekday').value;
  const day = parts.find(p => p.type === 'day').value;
  const month = parts.find(p => p.type === 'month').value;

  return `${weekday}, ${day} ${month}`;
}

    function formatEnglishDateFull(dateString){
      const date = parseDateInput(dateString);
      if(!date || isNaN(date.getTime())) return dateString;

      return date.toLocaleDateString('en-AU', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
    }

    function formatOrdinalDay(dateString){
      const date = parseDateInput(dateString);
      if(!date || isNaN(date.getTime())) return dateString;

      const day = date.getDate();
      let suffix = 'th';

      if(day % 100 < 11 || day % 100 > 13){
        if(day % 10 === 1) suffix = 'st';
        else if(day % 10 === 2) suffix = 'nd';
        else if(day % 10 === 3) suffix = 'rd';
      }

      return `${day}${suffix}`;
    }

    function getDocsStageLabel(mode){
      return mode === 'Air' ? 'DOCS' : 'FI';
    }

    function show(id, shouldShow){
      const el = document.getElementById(id);
      if (el) el.classList.toggle('hidden', !shouldShow);
    }

    function updateDocsStageOption(){
      const mode = document.getElementById('mode').value;
      const docsOption = document.querySelector('#stage option[value="docsStage"]');
      if (docsOption) docsOption.textContent = getDocsStageLabel(mode);
    }

    function updatePreAlertLabels(){
      const mode = document.getElementById('mode').value;

      document.getElementById('masterNoLabel').textContent = mode === 'Air' ? 'MAWB' : 'MBL';
      document.getElementById('houseNoLabel').textContent = mode === 'Air' ? 'HAWB' : 'HBL';

      if(mode === 'Air'){
        document.getElementById('transportNameLabel').textContent = 'AIRLINE';
        document.getElementById('etdLabel').textContent = 'ETD';
        document.getElementById('etaLabel').textContent = 'ETA';
      } else {
        document.getElementById('transportNameLabel').textContent = 'VESSEL / VOY';
        document.getElementById('etdLabel').textContent = 'POL / ETD';
        document.getElementById('etaLabel').textContent = 'POD / ETA';
      }
    }

    function toggleFieldsByStage(){
      const mode = document.getElementById('mode').value;
      const stage = document.getElementById('stage').value;
      const sMessageType = document.getElementById('sMessageType').value;

      document.getElementById('pickupLabel').textContent = 'Pickup date';

      const allOptional = [
        'sTypeWrap','aTypeWrap','preAlertTypeWrap','dnTypeWrap',
        'commodityWrap','cargoWrap','pickupWrap','bookingAirlineWrap',
        'truckingCompanyWrap','docsFlightDateWrap','docsAirWrap',
        'fiSeaWrap','fiSeaWrap2','preAlertWrap',
        'agentNameWrap','incotermsWrap','flightNameWrap',
        'pickupAddressWrap','dgWrap'
      ];
      allOptional.forEach(id => show(id, false));

      show('shipperConsigneeWrap', true);
      show('originDestinationWrap', true);
      show('refWrap', true);

      if(stage === 'S — Request'){
        show('sTypeWrap', true);
        if(sMessageType === 'agentDocs'){
          show('cargoWrap', true);
        }
      }

      else if(stage === 'A — Schedule'){
        show('aTypeWrap', true);
        show('pickupWrap', true);
        if(mode === 'Air'){
          show('preAlertWrap', true);
        }
      }

      else if(stage === 'CD — Check-in'){
        show('cargoWrap', true);
      }

      else if(stage === 'T — Trucking'){
        show('pickupWrap', true);
        show('truckingCompanyWrap', true);
      }

      else if(stage === 'B — Booking'){
        show('commodityWrap', true);
        show('cargoWrap', true);
        show('shipperConsigneeWrap', false);

        if(mode === 'Air'){
          show('pickupWrap', true);
          document.getElementById('pickupLabel').textContent = 'Delivery date';
          show('bookingAirlineWrap', true);
        }
      }

      else if(stage === 'Rate — Freight'){
        show('shipperConsigneeWrap', false);
        show('commodityWrap', true);
        show('cargoWrap', true);
        show('agentNameWrap', true);
        show('incotermsWrap', true);
        show('pickupAddressWrap', true);
        show('dgWrap', true);
        show('flightNameWrap', mode === 'Air');
      }

      else if(stage === 'docsStage'){
        show('shipperConsigneeWrap', false);
        if(mode === 'Air'){
          show('docsFlightDateWrap', true);
          show('docsAirWrap', true);
        } else {
          show('fiSeaWrap', true);
          show('fiSeaWrap2', true);
        }
      }

      else if(stage === 'Pre-alert'){
        show('preAlertTypeWrap', true);
        show('preAlertWrap', true);
      }

      else if(stage === 'D/N'){
        show('dnTypeWrap', true);
        show('shipperConsigneeWrap', false);
        show('originDestinationWrap', false);
      }
    }

    function buildSubject(style, stage, mode, shipper, consignee, origin, destination, ref, sMessageType, docsFlightDate, agentName, incoterms, flightName, mawbDocs, hawbDocs){
      const route = `${shortCode(origin)}-${shortCode(destination)}`;
      const routeSpaced = `${shortCode(origin)} – ${shortCode(destination)}`;

      if(stage === 'Rate — Freight'){
        if(mode === 'Air'){
          return `[운임 요청] ${agentName} / ${routeSpaced} / ${incoterms} / 항공 (${flightName})`;
        }
        return `[운임 요청] ${agentName} / ${routeSpaced} / ${incoterms} / ${mode.toUpperCase()}`;
      }

      if(stage === 'B — Booking'){
        return `PIN CARGO / BOOKING REQUEST / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(stage === 'A — Schedule'){
        return `PIN CARGO / 스케줄 안내 / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(stage === 'CD — Check-in'){
        return `PIN CARGO / 체크인 디테일 / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(stage === 'D/N'){
        return `PIN CARGO / D/N / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(stage === 'Pre-alert'){
        return `** PRE-ALERT ** PIN CARGO / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(stage === 'docsStage' && mode === 'Air'){
        return `** DOCS FOR ${formatOrdinalDay(docsFlightDate)} FLIGHT ** PIN CARGO / FLIGHT ** PIN CARGO / ${mawbDocs} / ${route} / AIR / ${ref} / ${hawbDocs}`;
      }

      if(stage === 'docsStage' && (mode === 'LCL' || mode === 'FCL')){
        return `** FI ** PIN CARGO / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(stage === 'T — Trucking'){
        return `** PICKUP NOTICE ** PIN CARGO / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(style === 'full'){
        if(stage === 'S — Request' && sMessageType === 'shipperSli'){
          return `PIN CARGO / EXPORT TO ${destination} / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
        }
        return `PIN CARGO / EXPORT TO ${destination} / S: ${shipper} / C: ${consignee} / ${route} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(style === 'standard'){
        return `PIN CARGO / ${stage} / ${shortCode(origin)} - ${shortCode(destination)} / ${mode.toUpperCase()}`;
      }

      if(style === 'agent'){
        if(stage === 'A — Schedule') return `[스케줄 안내] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'CD — Check-in') return `[체크인 디테일] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'D/N') return `[D/N 전달] ${origin} - ${destination} / ${mode} / ${ref}`;
        return `[${stage}] ${origin} - ${destination} / ${mode} / ${ref}`;
      }

      return `PIN CARGO / ${stage} / ${shortCode(origin)} - ${shortCode(destination)} / ${mode.toUpperCase()}`;
    }

    function buildPreAlertTableText(mode, masterNo, houseNo, transportName, etd, ts, eta){
      const masterLabel = mode === 'Air' ? 'MAWB' : 'MBL';
      const houseLabel = mode === 'Air' ? 'HAWB' : 'HBL';
      const transportLabel = mode === 'Air' ? 'AIRLINE' : 'VESSEL / VOY';
      const etdLabel = mode === 'Air' ? 'ETD' : 'POL / ETD';
      const etaLabel = mode === 'Air' ? 'ETA' : 'POD / ETA';

      return `${masterLabel}: ${masterNo}
${houseLabel}: ${houseNo}
${transportLabel}: ${transportName}
${etdLabel}: ${etd}
T/S: ${ts}
${etaLabel}: ${eta}`;
    }

    function buildPreAlertTableHtml(mode, masterNo, houseNo, transportName, etd, ts, eta){
      const masterLabel = mode === 'Air' ? 'MAWB' : 'MBL';
      const houseLabel = mode === 'Air' ? 'HAWB' : 'HBL';
      const transportLabel = mode === 'Air' ? 'AIRLINE' : 'VESSEL / VOY';
      const etdLabel = mode === 'Air' ? 'ETD' : 'POL / ETD';
      const etaLabel = mode === 'Air' ? 'ETA' : 'POD / ETA';

      const leftCellStyle = `
        border:1px solid #d9dee7;
        background:#f3f4f6;
        color:#374151;
        font-weight:700;
        text-align:left;
        vertical-align:middle;
        padding:16px 18px;
        width:32%;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      `;

      const rightCellStyle = `
        border:1px solid #d9dee7;
        background:#fcfcfd;
        color:#1f2937;
        text-align:left;
        vertical-align:middle;
        padding:16px 18px;
        width:68%;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      `;

      const tableStyle = `
        width:100%;
        border-collapse:collapse;
        table-layout:fixed;
        border:1px solid #d9dee7;
        background:#ffffff;
        margin:12px 0;
      `;

      return `
        <table style="${tableStyle}">
          <tr><td style="${leftCellStyle}">${escapeHtml(masterLabel)}</td><td style="${rightCellStyle}">${escapeHtml(masterNo) || '&nbsp;'}</td></tr>
          <tr><td style="${leftCellStyle}">${escapeHtml(houseLabel)}</td><td style="${rightCellStyle}">${escapeHtml(houseNo) || '&nbsp;'}</td></tr>
          <tr><td style="${leftCellStyle}">${escapeHtml(transportLabel)}</td><td style="${rightCellStyle}">${escapeHtml(transportName) || '&nbsp;'}</td></tr>
          <tr><td style="${leftCellStyle}">${escapeHtml(etdLabel)}</td><td style="${rightCellStyle}">${escapeHtml(etd) || '&nbsp;'}</td></tr>
          <tr><td style="${leftCellStyle}">T/S</td><td style="${rightCellStyle}">${escapeHtml(ts) || '&nbsp;'}</td></tr>

    async function copySubject(){
      const subject = document.getElementById('subject').textContent;
      await navigator.clipboard.writeText(subject);
      alert('Subject copied.');
    }

    async function copyBody(){
      const bodyEl = document.getElementById('body');

      try {
        if(bodyEl.querySelector('table')){
          const html = bodyEl.innerHTML;
          const plain = bodyEl.innerText;

          await navigator.clipboard.write([
            new ClipboardItem({
              'text/html': new Blob([html], { type: 'text/html' }),
              'text/plain': new Blob([plain], { type: 'text/plain' })
            })
          ]);
        } else {
          await navigator.clipboard.writeText(bodyEl.textContent);
        }
        alert('Body copied.');
      } catch (error) {
        await navigator.clipboard.writeText(bodyEl.innerText || bodyEl.textContent);
        alert('Body copied.');
      }
    }
