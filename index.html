<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freight Email Generator - Option B</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --primary:#1d4ed8;
      --primary-dark:#163ea8;
      --soft:#eef4ff;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#f7faff 0%, #eef4fb 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1240px;
      margin:32px auto;
      padding:0 20px;
    }

    .hero{ margin-bottom:20px; }

    .eyebrow{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:var(--soft);
      color:var(--primary);
      font-size:13px;
      font-weight:700;
      letter-spacing:.02em;
    }

    h1{
      margin:14px 0 8px;
      font-size:38px;
      line-height:1.1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:16px;
      max-width:840px;
      line-height:1.6;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      align-items:start;
      margin-top:24px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(219,227,238,.9);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#fcfdff;
    }

    .card-head h2{
      margin:0;
      font-size:20px;
    }

    .badge{
      font-size:12px;
      color:var(--primary);
      background:var(--soft);
      padding:7px 10px;
      border-radius:999px;
      font-weight:700;
    }

    .card-body{ padding:22px; }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .row-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .field{ margin-bottom:14px; }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
      color:#374151;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      color:var(--text);
      background:#fff;
      outline:none;
      transition:.18s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#7aa2ff;
      box-shadow:0 0 0 4px rgba(29,78,216,.08);
    }

    textarea{
      resize:vertical;
      line-height:1.5;
    }

    #cargo{ min-height:84px; }
    #note{ min-height:48px; }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:8px;
      margin-bottom:18px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:13px 18px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{ background:var(--primary-dark); }

    .btn-secondary{
      background:#eef2f7;
      color:#334155;
    }

    .btn-secondary:hover{ background:#e4eaf2; }

    .output-block{ margin-bottom:18px; }

    .output-label{
      font-size:13px;
      font-weight:700;
      color:#374151;
      margin-bottom:8px;
    }

    .subject-box, .body-box{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fbfdff;
    }

    .subject-box{
      padding:14px 16px;
      font-weight:600;
      min-height:54px;
      display:flex;
      align-items:center;
      line-height:1.5;
      word-break:break-word;
    }

    .body-box{
      padding:16px;
      min-height:520px;
      white-space:pre-wrap;
      line-height:1.65;
      font-size:14px;
    }

    .helper{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      background:#f8fafc;
      border:1px dashed var(--line);
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .section-title{
      margin:0 0 12px;
      font-size:15px;
      font-weight:800;
      color:#1f2937;
    }

    .footer-note{
      text-align:center;
      margin:18px 0 8px;
      color:var(--muted);
      font-size:13px;
    }

    .hidden{ display:none !important; }

    .sub-box{
      margin-bottom:14px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fcfdff;
    }

    .sub-box-title{
      margin:0 0 10px;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }

    @media (max-width: 700px){
      h1{font-size:30px}
      .row,.row-3{grid-template-columns:1fr}
      .wrap{margin:20px auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">🚚 Freight Operations Tool</span>
      <h1>Freight Email Generator</h1>
      <p class="sub">입력값에 따라 제목과 본문이 자동으로 생성됩니다.</p>
    </section>

    <section class="grid">
      <div class="card">
        <div class="card-head">
          <h2>Input</h2>
          <span class="badge">Shared Form</span>
        </div>
        <div class="card-body">

          <div class="section-title">Shipment Details</div>

          <div class="row-3">
            <div class="field">
              <label for="mode">Mode</label>
              <select id="mode">
                <option>Air</option>
                <option>LCL</option>
                <option>FCL</option>
              </select>
            </div>

            <div class="field">
              <label for="stage">Stage</label>
              <select id="stage">
                <option value="S — Request">S — Request</option>
                <option value="Rate — Freight">Rate — Freight</option>
                <option value="B — Booking">B — Booking</option>
                <option value="A — Schedule">A — Schedule</option>
                <option value="Check-in">Check-in</option>
                <option value="T — Trucking">T — Trucking</option>
                <option value="docsStage">DOCS / FI</option>
                <option value="Pre-alert">Pre-alert</option>
                <option value="D/N">D/N</option>
              </select>
            </div>

            <div class="field">
              <label for="subjectStyle">Subject Style</label>
              <select id="subjectStyle">
                <option value="full">Style 1 — With Stage / S / C / Ref</option>
                <option value="standard">Style 2 — Standard</option>
                <option value="agent">Style 3 — Korean Agent Style</option>
              </select>
            </div>
          </div>

          <div id="sTypeWrap" class="field hidden">
            <label for="sMessageType">S Message Type</label>
            <select id="sMessageType">
              <option value="agentInitial">Korean agent — initial update</option>
              <option value="shipperSli">Shipper — SLI request</option>
              <option value="agentDocs">Korean agent — docs update</option>
            </select>
          </div>

          <div id="aTypeWrap" class="field hidden">
            <label for="aMessageType">A Message Type</label>
            <select id="aMessageType">
              <option value="schedulePickup">Schedule + Pickup</option>
              <option value="scheduleRate">Schedule + Rate</option>
              <option value="schedulePickupRate">Schedule + Pickup + Rate</option>
            </select>
          </div>

          <div id="preAlertTypeWrap" class="field hidden">
            <label for="preAlertMessageType">Pre-alert Message Type</label>
            <select id="preAlertMessageType">
              <option value="preAlertOnly">Pre-alert only</option>
              <option value="preAlertDn">Pre-alert + D/N</option>
            </select>
          </div>

          <div id="dnTypeWrap" class="field hidden">
            <label for="dnMessageType">D/N Message Type</label>
            <select id="dnMessageType">
              <option value="sellingInfoDn">Selling info received + D/N</option>
              <option value="dnOnly">D/N only</option>
            </select>
          </div>

          <div id="preAlertWrap" class="sub-box hidden">
            <div class="sub-box-title">Pre-alert Details</div>

            <div class="row">
              <div class="field">
                <label id="masterNoLabel" for="masterNo">MAWB</label>
                <input id="masterNo" type="text" value="" />
              </div>
              <div class="field">
                <label id="houseNoLabel" for="houseNo">HAWB</label>
                <input id="houseNo" type="text" value="" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label id="transportNameLabel" for="transportName">Flight Name</label>
                <input id="transportName" type="text" value="" />
              </div>
              <div class="field">
                <label for="etd">ETD</label>
                <input id="etd" type="text" value="" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label for="ts">T/S</label>
                <input id="ts" type="text" value="" />
              </div>
              <div class="field">
                <label for="eta">ETA</label>
                <input id="eta" type="text" value="" />
              </div>
            </div>
          </div>

          <div id="shipperConsigneeWrap" class="row">
            <div class="field">
              <label for="shipper">Shipper</label>
              <input id="shipper" type="text" value="Dynamic Ratings Pty Ltd" />
            </div>
            <div class="field">
              <label for="consignee">Consignee</label>
              <input id="consignee" type="text" value="Pin Cargo Korea" />
            </div>
          </div>

          <div id="originDestinationWrap" class="row">
            <div class="field">
              <label for="origin">Origin</label>
              <input id="origin" type="text" value="Sydney" />
            </div>
            <div class="field">
              <label for="destination">Destination</label>
              <input id="destination" type="text" value="Busan" />
            </div>
          </div>

          <div id="commodityWrap" class="field">
            <label for="commodity">Commodity</label>
            <input id="commodity" type="text" value="Pump parts" />
          </div>

          <div id="cargoWrap" class="field">
            <label for="cargo">Cargo details</label>
            <textarea id="cargo" rows="3">1 CASE / 66 KGS / 83 x 83 x 63 cm</textarea>
          </div>

          <div id="pickupRefWrap" class="row">
            <div id="pickupWrap" class="field">
              <label for="pickup">Pickup date</label>
              <input id="pickup" type="text" value="10 March 2026" />
            </div>
            <div id="refWrap" class="field">
              <label for="ref">Reference</label>
              <input id="ref" type="text" value="S00013958" />
            </div>
          </div>

          <div id="rateExtraWrap" class="row">
            <div id="agentNameWrap" class="field">
              <label for="agentName">Agent Name</label>
              <input id="agentName" type="text" value="" />
            </div>
            <div id="incotermsWrap" class="field">
              <label for="incoterms">Incoterms</label>
              <input id="incoterms" type="text" value="" />
            </div>
          </div>

          <div id="rateExtraWrap2" class="row">
            <div id="flightNameWrap" class="field">
              <label for="flightName">Flight / Carrier Name</label>
              <input id="flightName" type="text" value="" />
            </div>
            <div id="pickupAddressWrap" class="field">
              <label for="pickupAddress">Pick-up Address</label>
              <input id="pickupAddress" type="text" value="" />
            </div>
          </div>

          <div id="noteWrap" class="field">
            <label for="note">Special note</label>
            <textarea id="note" rows="1">Please use the next available schedule.</textarea>
          </div>

          <div id="docsAirWrap" class="row hidden">
            <div class="field">
              <label for="mawbDocs">MAWB</label>
              <input id="mawbDocs" type="text" value="" />
            </div>
            <div class="field">
              <label for="hawbDocs">HAWB</label>
              <input id="hawbDocs" type="text" value="" />
            </div>
          </div>

          <div id="fiSeaWrap" class="row hidden">
            <div class="field">
              <label for="mblFi">MBL</label>
              <input id="mblFi" type="text" value="" />
            </div>
            <div class="field">
              <label for="hsCodeFi">HS Code</label>
              <input id="hsCodeFi" type="text" value="" />
            </div>
          </div>

          <div id="fiSeaWrap2" class="field hidden">
            <label for="ednFi">EDN</label>
            <input id="ednFi" type="text" value="" />
          </div>

        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <h2>Output</h2>
          <span class="badge">Live Preview</span>
        </div>
        <div class="card-body">

          <div class="actions">
            <button class="btn-primary" onclick="copyBody()">Copy Body</button>
            <button class="btn-secondary" onclick="copySubject()">Copy Subject</button>
            <button class="btn-secondary" onclick="resetDemo()">Reset Demo</button>
          </div>

          <div class="output-block">
            <div class="output-label">Email Subject</div>
            <div id="subject" class="subject-box"></div>
          </div>

          <div class="output-block">
            <div class="output-label">Email Body</div>
            <div id="body" class="body-box"></div>
          </div>

        </div>
      </div>
    </section>
  </div>

  <script>
    function shortCode(city){
      const map = {
        "Sydney":"SYD",
        "Melbourne":"MEL",
        "Brisbane":"BNE",
        "Perth":"PER",
        "Adelaide":"ADL",
        "Busan":"PUS",
        "Seoul":"SEL",
        "Incheon":"INC",
        "Jakarta":"JKT",
        "Delhi":"DEL",
        "Ho Chi Minh":"SGN",
        "Auckland":"AKL",
        "Singapore":"SIN",
        "Los Angeles":"LAX",
        "Frankfurt":"FRE"
      };
      return map[city] || city.toUpperCase().replace(/\s+/g, '').slice(0,3);
    }

    function escapeHtml(text){
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getDocsStageLabel(mode){
      return mode === 'Air' ? 'DOCS' : 'FI';
    }

    function updateDocsStageOption(){
      const mode = document.getElementById('mode').value;
      const stage = document.getElementById('stage');
      const docsOption = stage.querySelector('option[value="docsStage"]');
      if (docsOption) docsOption.textContent = getDocsStageLabel(mode);
    }

    function toggleSMessageType(){
      const stage = document.getElementById('stage').value;
      document.getElementById('sTypeWrap').classList.toggle('hidden', stage !== 'S — Request');
    }

    function toggleAMessageType(){
      const stage = document.getElementById('stage').value;
      document.getElementById('aTypeWrap').classList.toggle('hidden', stage !== 'A — Schedule');
    }

    function togglePreAlertFields(){
      const stage = document.getElementById('stage').value;
      const show = stage === 'Pre-alert';
      document.getElementById('preAlertTypeWrap').classList.toggle('hidden', !show);
      document.getElementById('preAlertWrap').classList.toggle('hidden', !show);
    }

    function toggleDnMessageType(){
      const stage = document.getElementById('stage').value;
      document.getElementById('dnTypeWrap').classList.toggle('hidden', stage !== 'D/N');
    }

    function toggleDocsFiFields(){
      const stage = document.getElementById('stage').value;
      const mode = document.getElementById('mode').value;

      const showAirDocs = stage === 'docsStage' && mode === 'Air';
      const showSeaFi = stage === 'docsStage' && (mode === 'LCL' || mode === 'FCL');

      document.getElementById('docsAirWrap').classList.toggle('hidden', !showAirDocs);
      document.getElementById('fiSeaWrap').classList.toggle('hidden', !showSeaFi);
      document.getElementById('fiSeaWrap2').classList.toggle('hidden', !showSeaFi);
    }

    function updatePreAlertFieldLabels(){
      const mode = document.getElementById('mode').value;
      document.getElementById('masterNoLabel').textContent = mode === 'Air' ? 'MAWB' : 'MBL';
      document.getElementById('houseNoLabel').textContent = mode === 'Air' ? 'HAWB' : 'HBL';
      document.getElementById('transportNameLabel').textContent = mode === 'Air' ? 'Flight Name' : 'Vessel Name';
    }

    function applyDefaultSubjectStyle(stage, sMessageType){
      const subjectStyle = document.getElementById('subjectStyle');
      if(stage === 'S — Request' && sMessageType === 'shipperSli'){
        subjectStyle.value = 'full';
      }
    }

    function toggleStageSpecificHiddenFields(){
      const stage = document.getElementById('stage').value;
      const mode = document.getElementById('mode').value;

      const isDn = stage === 'D/N';
      const isPreAlert = stage === 'Pre-alert';
      const isCheckIn = stage === 'Check-in';
      const isDocsAir = stage === 'docsStage' && mode === 'Air';
      const isFiSea = stage === 'docsStage' && (mode === 'LCL' || mode === 'FCL');
      const isDocsStage = isDocsAir || isFiSea;

      document.getElementById('commodityWrap').classList.toggle('hidden', isDn || isPreAlert || isDocsStage);
      document.getElementById('cargoWrap').classList.toggle('hidden', isDn || isPreAlert || isDocsStage);
      document.getElementById('pickupWrap').classList.toggle('hidden', isDn || isPreAlert || isDocsStage);

      document.getElementById('refWrap').classList.toggle('hidden', false);

      const hideRateFields = isDn || isPreAlert || isDocsStage || isCheckIn;
      document.getElementById('agentNameWrap').classList.toggle('hidden', hideRateFields);
      document.getElementById('incotermsWrap').classList.toggle('hidden', hideRateFields);
      document.getElementById('flightNameWrap').classList.toggle('hidden', hideRateFields);
      document.getElementById('pickupAddressWrap').classList.toggle('hidden', hideRateFields);
      document.getElementById('noteWrap').classList.toggle('hidden', hideRateFields);

      document.getElementById('rateExtraWrap').classList.toggle('hidden', hideRateFields);
      document.getElementById('rateExtraWrap2').classList.toggle('hidden', hideRateFields);

      document.getElementById('shipperConsigneeWrap').classList.toggle('hidden', isDocsStage);
    }

    function stageLabelForSubject(stage, mode, sMessageType){
      if(stage === 'S — Request'){
        if(sMessageType === 'agentInitial') return 'S AGENT INITIAL';
        if(sMessageType === 'shipperSli') return 'EXPORT TO';
        if(sMessageType === 'agentDocs') return 'S AGENT DOCS';
        return 'SHIPMENT ENQUIRY';
      }
      if(stage === 'Rate — Freight') return 'RATE REQUEST';
      if(stage === 'B — Booking') return 'BOOKING REQUEST';
      if(stage === 'A — Schedule') return 'SCHEDULE';
      if(stage === 'Check-in') return 'CHECK-IN';
      if(stage === 'T — Trucking') return 'PICK UP NOTICE';
      if(stage === 'docsStage') return getDocsStageLabel(mode);
      if(stage === 'Pre-alert') return 'PRE-ALERT';
      if(stage === 'D/N') return 'D/N';
      return 'SHIPMENT';
    }

    function buildSubject(style, stage, mode, shipper, consignee, origin, destination, ref, sMessageType){
      const route = `${shortCode(origin)} - ${shortCode(destination)}`;
      const routeCompact = `${shortCode(origin)}-${shortCode(destination)}`;
      const stageText = stageLabelForSubject(stage, mode, sMessageType);

      if(style === 'standard'){
        return `PIN CARGO / ${stageText} / ${route} / ${mode.toUpperCase()}`;
      }

      if(style === 'full'){
        if(stage === 'S — Request' && sMessageType === 'shipperSli'){
          return `PIN CARGO / EXPORT TO ${destination} / S: ${shipper} / C: ${consignee} / ${routeCompact} / ${mode.toUpperCase()} / ${ref}`;
        }
        return `PIN CARGO / ${stageText} / S: ${shipper} / C: ${consignee} / ${routeCompact} / ${mode.toUpperCase()} / ${ref}`;
      }

      if(style === 'agent'){
        if(stage === 'Rate — Freight') return `[운임 확인] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'A — Schedule') return `[스케줄 안내] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'Check-in') return `[체크인 디테일] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'Pre-alert') return `[PRE-ALERT] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'D/N') return `[D/N 전달] ${origin} - ${destination} / ${mode} / ${ref}`;
        if(stage === 'docsStage') return `[${getDocsStageLabel(mode)}] ${origin} - ${destination} / ${mode} / ${ref}`;
        return `[${stageText}] ${origin} - ${destination} / ${mode} / ${ref}`;
      }

      return `PIN CARGO / ${stageText} / ${route} / ${mode.toUpperCase()}`;
    }

    function buildPreAlertTableText(mode, masterNo, houseNo, transportName, etd, ts, eta){
      const masterLabel = mode === 'Air' ? 'MAWB' : 'MBL';
      const houseLabel = mode === 'Air' ? 'HAWB' : 'HBL';
      const transportLabel = mode === 'Air' ? 'FLIGHT NAME' : 'VESSEL NAME';

      return `${masterLabel}: ${masterNo}
${houseLabel}: ${houseNo}
${transportLabel}: ${transportName}
ETD: ${etd}
T/S: ${ts}
ETA: ${eta}`;
    }

    function buildPreAlertTableHtml(mode, masterNo, houseNo, transportName, etd, ts, eta){
      const masterLabel = mode === 'Air' ? 'MAWB' : 'MBL';
      const houseLabel = mode === 'Air' ? 'HAWB' : 'HBL';
      const transportLabel = mode === 'Air' ? 'FLIGHT NAME' : 'VESSEL NAME';

      const leftCellStyle = `
        border:1px solid #d9dee7;
        background:#f3f4f6;
        color:#374151;
        font-weight:700;
        text-align:left;
        vertical-align:middle;
        padding:16px 18px;
        width:32%;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      `;

      const rightCellStyle = `
        border:1px solid #d9dee7;
        background:#fcfcfd;
        color:#1f2937;
        text-align:left;
        vertical-align:middle;
        padding:16px 18px;
        width:68%;
        font-family:Arial, Helvetica, sans-serif;
        font-size:14px;
      `;

      const tableStyle = `
        width:100%;
        border-collapse:collapse;
        table-layout:fixed;
        border:1px solid #d9dee7;
        background:#ffffff;
        margin:12px 0;
      `;

      return `
        <table style="${tableStyle}">
          <tr>
            <td style="${leftCellStyle}">${escapeHtml(masterLabel)}</td>
            <td style="${rightCellStyle}">${escapeHtml(masterNo) || '&nbsp;'}</td>
          </tr>
          <tr>
            <td style="${leftCellStyle}">${escapeHtml(houseLabel)}</td>
            <td style="${rightCellStyle}">${escapeHtml(houseNo) || '&nbsp;'}</td>
          </tr>
          <tr>
            <td style="${leftCellStyle}">${escapeHtml(transportLabel)}</td>
            <td style="${rightCellStyle}">${escapeHtml(transportName) || '&nbsp;'}</td>
          </tr>
          <tr>
            <td style="${leftCellStyle}">ETD</td>
            <td style="${rightCellStyle}">${escapeHtml(etd) || '&nbsp;'}</td>
          </tr>
          <tr>
            <td style="${leftCellStyle}">T/S</td>
            <td style="${rightCellStyle}">${escapeHtml(ts) || '&nbsp;'}</td>
          </tr>
          <tr>
            <td style="${leftCellStyle}">ETA</td>
            <td style="${rightCellStyle}">${escapeHtml(eta) || '&nbsp;'}</td>
          </tr>
        </table>
      `;
    }

    function generateEmail(){
      updateDocsStageOption();
      toggleSMessageType();
      toggleAMessageType();
      togglePreAlertFields();
      toggleDnMessageType();
      toggleDocsFiFields();
      updatePreAlertFieldLabels();
      toggleStageSpecificHiddenFields();

      const mode = document.getElementById('mode').value;
      const stage = document.getElementById('stage').value;
      const sMessageType = document.getElementById('sMessageType').value;
      const aMessageType = document.getElementById('aMessageType').value;
      const preAlertMessageType = document.getElementById('preAlertMessageType').value;
      const dnMessageType = document.getElementById('dnMessageType').value;

      applyDefaultSubjectStyle(stage, sMessageType);

      const subjectStyle = document.getElementById('subjectStyle').value;

      const shipper = document.getElementById('shipper').value.trim();
      const consignee = document.getElementById('consignee').value.trim();
      const origin = document.getElementById('origin').value.trim();
      const destination = document.getElementById('destination').value.trim();
      const cargo = document.getElementById('cargo').value.trim();
      const pickup = document.getElementById('pickup').value.trim();
      const ref = document.getElementById('ref').value.trim();

      const mawbDocs = document.getElementById('mawbDocs').value.trim();
      const hawbDocs = document.getElementById('hawbDocs').value.trim();
      const mblFi = document.getElementById('mblFi').value.trim();
      const hsCodeFi = document.getElementById('hsCodeFi').value.trim();
      const ednFi = document.getElementById('ednFi').value.trim();

      const masterNo = document.getElementById('masterNo').value.trim();
      const houseNo = document.getElementById('houseNo').value.trim();
      const transportName = document.getElementById('transportName').value.trim();
      const etd = document.getElementById('etd').value.trim();
      const ts = document.getElementById('ts').value.trim();
      const eta = document.getElementById('eta').value.trim();

      const preAlertTableText = buildPreAlertTableText(mode, masterNo, houseNo, transportName, etd, ts, eta);
      const preAlertTableHtml = buildPreAlertTableHtml(mode, masterNo, houseNo, transportName, etd, ts, eta);

      const subject = buildSubject(
        subjectStyle, stage, mode, shipper, consignee, origin, destination, ref, sMessageType
      );

      let body = '';

      if(stage === 'S — Request'){
        if(sMessageType === 'agentInitial'){
          body = `안녕하세요.

쉬퍼 측 컨택 후 일정 및 운임 안내드리겠습니다.

감사합니다.`;
        } else if(sMessageType === 'shipperSli'){
          body = `Hi Team,

We have been informed that you have an export shipment to ${destination}.

Please advise on the following:

- Provide the SLI, Packing list and Commercial invoice.
- What is the Incoterm for this shipment?
- Advise when the cargo is ready for collection.
- Advise the pickup address and operating hours.
- Provide photos of the cargo.
- Do you need any REF # for pickup?
- Provide the warehouse contact person and contact phone number.
- Is there a forklift available on site?
- Does this cargo contain any batteries and DG/Haz?

CONSIGNEE: ${consignee}

** If the cargo contains any batteries or dangerous goods, it must be marked and labelled in
accordance with dangerous goods regulations. **`;
        } else {
          body = `안녕하세요.

쉬퍼 측 서류 및 화물 디테일 전달드립니다.
부킹 후 일정 안내드리겠습니다.

감사합니다.`;
        }
      }

      else if(stage === 'A — Schedule'){
        if(aMessageType === 'schedulePickup'){
          body = `안녕하세요.

본건 컨펌된 스케쥴 안내드립니다.
픽업은 ${pickup}일 예정입니다.
픽업 후 체크인 디테일 송부드리겠습니다.

감사합니다.`;
        } else if(aMessageType === 'scheduleRate'){
          body = `안녕하세요.

본건 컨펌된 스케쥴 안내드립니다.
하기에 운임 안내드립니다.

감사합니다.`;
        } else {
          body = `안녕하세요.

본건 컨펌된 스케쥴 안내드립니다.
픽업은 ${pickup}일 예정입니다.
픽업 후 체크인 디테일 송부드리겠습니다.
하기에 운임 안내드립니다.

감사합니다.`;
        }
      }

      else if(stage === 'Check-in'){
        if(mode === 'Air'){
          body = `안녕하세요. 

하기에 입고된 화물 체크인 디테일 전달드립니다.

${cargo}

항공 서류는 준비되는 대로 송부드리겠습니다.

감사합니다.`;
        } else {
          body = `안녕하세요. 

하기에 입고된 화물 체크인 디테일 전달드립니다.

${cargo}
화물 서류는 준비되는 대로 송부드리겠습니다.

감사합니다.`;
        }
      }

      else if(stage === 'T — Trucking'){
        body = `Hi Shipper,

We have arranged pick-up for the below shipment.

Pick-up date: ${pickup}
Reference: ${ref}

Please confirm the cargo is ready for collection.

Kind regards,
Jin`;
      }

      else if(stage === 'docsStage'){
        if(mode === 'Air'){
          body = `Hi Team,

Please find the attached docs.

MAWB: ${mawbDocs}
HAWB: ${hawbDocs}`;
        } else {
          body = `Hi Team,

Please find the attached FI for ${mblFi}.

HS Code: ${hsCodeFi}
EDN: ${ednFi}`;
        }
      }

      else if(stage === 'Pre-alert'){
        if(preAlertMessageType === 'preAlertOnly'){
          body = `안녕하세요.

본건 pre-alert 송부드립니다.
셀링 인폼 주시면 D/N 전달드리겠습니다.

${preAlertTableText}

감사합니다.`;
        } else {
          body = `안녕하세요.

본건 pre-alert 및 D/N 송부드립니다.

${preAlertTableText}

감사합니다.`;
        }
      }

      else if(stage === 'D/N'){
        if(dnMessageType === 'sellingInfoDn'){
          body = `안녕하세요.

셀링 인폼 감사드리며 본건 D/N 송부드립니다.

감사합니다.`;
        } else {
          body = `안녕하세요.

본건 D/N 송부드립니다.

감사합니다.`;
        }
      }

      else {
        body = '';
      }

      document.getElementById('subject').textContent = subject;

      const bodyEl = document.getElementById('body');

      if(stage === 'Pre-alert'){
        if(preAlertMessageType === 'preAlertOnly'){
          bodyEl.innerHTML = `
            <div style="font-family:Arial, Helvetica, sans-serif; font-size:14px; color:#1f2937; line-height:1.65;">
              안녕하세요.<br><br>
              본건 pre-alert 송부드립니다.<br>
              셀링 인폼 주시면 D/N 전달드리겠습니다.<br><br>
              ${preAlertTableHtml}
              감사합니다.
            </div>
          `;
        } else {
          bodyEl.innerHTML = `
            <div style="font-family:Arial, Helvetica, sans-serif; font-size:14px; color:#1f2937; line-height:1.65;">
              안녕하세요.<br><br>
              본건 pre-alert 및 D/N 송부드립니다.<br><br>
              ${preAlertTableHtml}
              감사합니다.
            </div>
          `;
        }
      } else {
        bodyEl.textContent = body;
      }
    }

    async function copySubject(){
      const subject = document.getElementById('subject').textContent;
      await navigator.clipboard.writeText(subject);
      alert('Subject copied.');
    }

    async function copyBody(){
      const bodyEl = document.getElementById('body');

      try {
        if(bodyEl.querySelector('table')){
          const html = bodyEl.innerHTML;
          const plain = bodyEl.innerText;

          await navigator.clipboard.write([
            new ClipboardItem({
              'text/html': new Blob([html], { type: 'text/html' }),
              'text/plain': new Blob([plain], { type: 'text/plain' })
            })
          ]);
        } else {
          await navigator.clipboard.writeText(bodyEl.textContent);
        }
        alert('Body copied.');
      } catch (error) {
        await navigator.clipboard.writeText(bodyEl.innerText || bodyEl.textContent);
        alert('Body copied.');
      }
    }

    function resetDemo(){
      document.getElementById('mode').value = 'Air';
      document.getElementById('stage').value = 'S — Request';
      document.getElementById('subjectStyle').value = 'full';

      document.getElementById('sMessageType').value = 'agentInitial';
      document.getElementById('aMessageType').value = 'schedulePickup';
      document.getElementById('preAlertMessageType').value = 'preAlertOnly';
      document.getElementById('dnMessageType').value = 'sellingInfoDn';

      document.getElementById('shipper').value = 'Dynamic Ratings Pty Ltd';
      document.getElementById('consignee').value = 'Pin Cargo Korea';
      document.getElementById('origin').value = 'Sydney';
      document.getElementById('destination').value = 'Busan';
      document.getElementById('cargo').value = '1 CASE / 66 KGS / 83 x 83 x 63 cm';
      document.getElementById('pickup').value = '10 March 2026';
      document.getElementById('ref').value = 'S00013958';

      document.getElementById('mawbDocs').value = '';
      document.getElementById('hawbDocs').value = '';
      document.getElementById('mblFi').value = '';
      document.getElementById('hsCodeFi').value = '';
      document.getElementById('ednFi').value = '';

      document.getElementById('masterNo').value = '';
      document.getElementById('houseNo').value = '';
      document.getElementById('transportName').value = '';
      document.getElementById('etd').value = '';
      document.getElementById('ts').value = '';
      document.getElementById('eta').value = '';

      generateEmail();
    }

    const fields = document.querySelectorAll('input, select, textarea');
    fields.forEach(field => {
      field.addEventListener('input', generateEmail);
      field.addEventListener('change', generateEmail);
    });

    window.addEventListener('DOMContentLoaded', generateEmail);
  </script>
